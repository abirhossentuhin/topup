<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Order Success – BD TopUp</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f1a;font-family:'Segoe UI',sans-serif;color:#e8eaf6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.success-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:32px 24px;text-align:center;max-width:360px;width:100%;}
.check-icon{width:72px;height:72px;border-radius:50%;background:rgba(76,175,80,.15);border:2px solid rgba(76,175,80,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
h2{font-size:20px;font-weight:900;color:#fff;margin-bottom:8px;}
p{font-size:13px;color:#78909c;line-height:1.6;margin-bottom:6px;}
.order-id{font-size:13px;font-weight:700;color:#42a5f5;background:rgba(66,165,245,.1);padding:8px 16px;border-radius:20px;display:inline-block;margin:10px 0;}
.note{font-size:12px;color:#ffd54f;background:rgba(255,213,79,.08);border:1px solid rgba(255,213,79,.15);border-radius:12px;padding:10px 14px;margin-top:12px;line-height:1.5;}
.btn-row{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
.btn-primary{background:linear-gradient(135deg,#1565c0,#0288d1);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;text-decoration:none;display:block;text-align:center;}
.btn-secondary{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#e8eaf6;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:block;text-align:center;}
</style>
</head>
<body>
<div class="success-card">
  <div class="check-icon">✅</div>
  <h2>Order Submitted!</h2>
  <p>আপনার order সফলভাবে জমা হয়েছে।</p>
  <div class="order-id" id="oid">লোড হচ্ছে...</div>
  <p>আমরা আপনার TrxID verify করে দ্রুত Diamond TopUp করে দেব।</p>
  <div class="note">⏱️ সাধারণত ৫-৩০ মিনিটের মধ্যে সম্পন্ন হয়। "My Orders" এ status দেখুন।</div>
  <div class="btn-row">
    <a href="orders.html" class="btn-primary"><i class="fas fa-shopping-bag"></i> My Orders দেখুন</a>
    <a href="index.html" class="btn-secondary"><i class="fas fa-home"></i> Home এ যান</a>
  </div>
</div>
<script>
const id = new URLSearchParams(location.search).get('id');
document.getElementById('oid').textContent = id ? '#' + id : 'Order ID পাওয়া যায়নি';
</script>
</body>
</html>
